<style>
  /* Lock everything to the real visible screen. In home-screen (standalone) mode
     there's no browser toolbar, so this fills the device edge-to-edge with no gap. */
  html{height:100%}
  body{margin:0;background:#0b1220;position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden}
  #app{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#93a1c0;
    font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#0b1220;z-index:2}
  .sp{width:22px;height:22px;border:3px solid #ffffff33;border-top-color:#3b82f6;border-radius:50%;animation:s .8s linear infinite;margin-right:10px}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div id="load"><div class="sp"></div>Loading Swole Hub…</div>
  <iframe id="app"
          src="https://script.google.com/macros/s/AKfycbzwdvEgFhW6_jixW6ryDZyPVwg-8Ec6PQkmYYNhw5GM6emC16RqNwYg5eQcXe5tDymRoA/exec"
          allow="fullscreen; clipboard-write"
          onload="document.getElementById('load').style.display='none'"></iframe>
